name: mac-build-app-test

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: brew install llvm luajit sdl3 sdl3_ttf

      - name: Install Odin
        run: |
          git clone --depth=1 https://github.com/odin-lang/Odin odin
          cd odin
          git fetch --depth=1 origin tag dev-2026-04
          git checkout dev-2026-04
          LLVM_CONFIG="$(brew --prefix llvm)/bin/llvm-config" make release-native
          echo "$GITHUB_WORKSPACE/odin" >> "$GITHUB_PATH"
          echo "ODIN_ROOT=$GITHUB_WORKSPACE/odin" >> "$GITHUB_ENV"

      - name: Check Odin
        run: odin version

      - name: Export brew library paths
        run: |
          echo "LIBRARY_PATH=/opt/homebrew/lib:$(brew --prefix luajit)/lib:$(brew --prefix sdl3)/lib:$(brew --prefix sdl3_ttf)/lib:$LIBRARY_PATH" >> "$GITHUB_ENV"
          echo "DYLD_FALLBACK_LIBRARY_PATH=/opt/homebrew/lib:$(brew --prefix luajit)/lib:$(brew --prefix sdl3)/lib:$(brew --prefix sdl3_ttf)/lib:$DYLD_FALLBACK_LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: Build miniaudio
        run: make -C "$ODIN_ROOT/vendor/miniaudio/src"

      - name: Create test main.lua
        run: |
          mkdir -p build/lua
          cat > build/lua/main.lua <<'EOF'
          runtime.init = function()
              local resdir = filesystem.get_resource_directory()
              local cwd, cwd_err = filesystem.get_working_directory()
              local charw, charh = graphics.measure_text("@")
              local winw, winh = window.get_size()

              local out = ""
              out = out .. "resdir=" .. tostring(resdir) .. "\n"
              out = out .. "cwd=" .. tostring(cwd or cwd_err) .. "\n"
              out = out .. "char=" .. tostring(charw) .. "x" .. tostring(charh) .. "\n"
              out = out .. "window=" .. tostring(winw) .. "x" .. tostring(winh) .. "\n"

              filesystem.write_file(resdir .. "/mac_smoke.txt", out)
              window.close()
          end
          EOF

      - name: Build luagame
        run: odin build src -out:build/luagame

      - name: Package app bundle
        run: |
          set -e

          APP_ROOT="deploy/macos/luagame.app"
          APP_CONTENTS="$APP_ROOT/Contents"
          APP_MACOS="$APP_CONTENTS/MacOS"
          APP_FRAMEWORKS="$APP_CONTENTS/Frameworks"

          rm -rf "$APP_ROOT"
          mkdir -p "$APP_MACOS" "$APP_FRAMEWORKS"

          cp build/luagame "$APP_MACOS/luagame"
          chmod +x "$APP_MACOS/luagame"

          cp -R build/lua "$APP_MACOS/"

          cat > "$APP_CONTENTS/Info.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>luagame</string>
              <key>CFBundleIdentifier</key>
              <string>com.quillwyrm.luagame</string>
              <key>CFBundleName</key>
              <string>luagame</string>
              <key>CFBundleDisplayName</key>
              <string>luagame</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleVersion</key>
              <string>0.0.0</string>
              <key>CFBundleShortVersionString</key>
              <string>0.0.0</string>
          </dict>
          </plist>
          EOF

          bundle_and_rewrite() {
            local target="$1"
            local dep
            local dep_name
            local dep_dst

            chmod u+w "$target" || true

            while read -r dep; do
              case "$dep" in
                /opt/homebrew/*)
                  dep_name="$(basename "$dep")"
                  dep_dst="$APP_FRAMEWORKS/$dep_name"

                  if [ ! -e "$dep_dst" ]; then
                    cp -L "$dep" "$dep_dst"
                    chmod u+w "$dep_dst" || true
                    install_name_tool -id "@executable_path/../Frameworks/$dep_name" "$dep_dst" || true
                    bundle_and_rewrite "$dep_dst"
                  fi

                  install_name_tool -change "$dep" "@executable_path/../Frameworks/$dep_name" "$target" || true
                  ;;
              esac
            done < <(otool -L "$target" | tail -n +2 | awk '{print $1}')
          }

          bundle_and_rewrite "$APP_MACOS/luagame"

      - name: Show bundled executable links
        run: otool -L deploy/macos/luagame.app/Contents/MacOS/luagame

      - name: Ad-hoc sign app
        run: codesign --force --deep --sign - deploy/macos/luagame.app

      - name: Run bundled app
        run: |
          unset DYLD_FALLBACK_LIBRARY_PATH
          ./deploy/macos/luagame.app/Contents/MacOS/luagame

      - name: Show bundle smoke file
        run: cat deploy/macos/luagame.app/Contents/MacOS/mac_smoke.txt

      - name: Archive app bundle
        run: tar -czf deploy/macos/luagame-macos-arm64.tar.gz -C deploy/macos luagame.app

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: luagame-macos-arm64
          path: deploy/macos/luagame-macos-arm64.tar.gz
