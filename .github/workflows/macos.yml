name: mac-build-smoke-test

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      # Mac deps needed for your build/runtime test
      - name: Install Homebrew deps
        run: brew install luajit sdl3 sdl3_ttf

      # Install Odin into a local folder inside the runner workspace
      - name: Install Odin
        run: |
          curl -L https://github.com/odin-lang/Odin/releases/latest/download/odin-macos-arm64-dev-2026-10.zip -o odin.zip
          unzip odin.zip -d odin
          echo "$GITHUB_WORKSPACE/odin" >> $GITHUB_PATH
          echo "ODIN_ROOT=$GITHUB_WORKSPACE/odin" >> $GITHUB_ENV

      # Build miniaudio static archive for non-Windows
      - name: Build miniaudio
        run: make -C "$ODIN_ROOT/vendor/miniaudio/src"

      - name: Create test main.lua
        run: |
          mkdir -p build/lua
          cat > build/lua/main.lua <<'EOF'
          runtime.init = function()
              local resdir = filesystem.get_resource_directory()
              local cwd = filesystem.get_working_directory()
              local charw, charh = graphics.measure_text("@")
              local winw, winh = window.get_size()

              print(string.format("resdir: %s", tostring(resdir)))
              print(string.format("cwd: %s", tostring(cwd)))
              print(string.format("char: %s x %s", tostring(charw), tostring(charh)))
              print(string.format("window: %s x %s", tostring(winw), tostring(winh)))
          end
          EOF

      # Build the mac executable
      - name: Build luagame
        run: odin build src -out:build/luagame

      # Run it
      - name: Run luagame
        run: ./build/luagame
