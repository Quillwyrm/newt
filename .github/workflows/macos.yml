name: mac-brew-test

# Show a "Run workflow" button in the Actions tab.
on:
  workflow_dispatch:

jobs:
  brew-test:
    # Apple Silicon macOS runner.
    runs-on: macos-26

    steps:
      # Put your repo files onto the runner machine.
      - name: Check out repo
        uses: actions/checkout@v4

      # Install the mac build dependencies you care about.
      - name: Install Homebrew deps
        run: brew install luajit sdl3 sdl3_ttf

      # Tiny sanity check so the log shows what got installed.
      - name: Show installed versions
        run: brew list --versions luajit sdl3 sdl3_ttf
